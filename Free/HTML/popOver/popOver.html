<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pop Over</title>
    <style>
        *{
            box-sizing: border-box;
        }
        body{
            background-color: #f5f5f5;
        }

        main{
            margin: auto;
            max-width: 1000px;

            background-color: white;
        }
        
        #popOverBtn{
            anchor-name: --popOverBtn;

            display: block;
            margin: auto;

            width:300px;

            color: rgb(82, 53, 1);
            background-color: rgb(255, 165, 0);

            font-size: 1.5em;
            text-align: center;

            border-radius: 3px;
            border-color: currentColor;
        }

        #content{
            position: absolute;
            position-anchor: --popOverBtn;
            position-area: bottom center;
            margin-top: 2px;
            width: 300px;
            border: 1px solid purple;
            border-radius: 3px;
            box-sizing: border-box;
            text-align: center;
        }
    </style>
</head>
<body>
    <main>
        <section id="popoverSection">
            <button id="popOverBtn" popovertarget="content"
            >press button</button>
            <div id="content" popover>Conteúdo do dropdown</div>
        </section>
    </main>
</body>
</html>
